services:
  postgres:
    image: postgres:16.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: procurement
      POSTGRES_USER: procurement
      POSTGRES_PASSWORD: procurement
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U procurement -d procurement"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: tableformatter-app
    restart: unless-stopped
    env_file: .env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/google-service-account.json
      EIS_CA_BUNDLE: /app/certs/eis-ca-bundle.pem
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - document-cache:/var/cache/procurement-documents
      - ./certs:/app/certs:ro
      - ${GOOGLE_SERVICE_ACCOUNT_FILE:-./secrets/google-service-account.json}:/run/secrets/google-service-account.json:ro
    expose:
      - "8080"
    networks:
      - default
      - web
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  worker:
    build: .
    container_name: tableformatter-worker
    restart: unless-stopped
    command: ["python", "-m", "app.scheduler.worker"]
    env_file: .env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/google-service-account.json
      EIS_CA_BUNDLE: /app/certs/eis-ca-bundle.pem
      PYTHONUNBUFFERED: "1"
    depends_on:
      app:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - document-cache:/var/cache/procurement-documents
      - ./certs:/app/certs:ro
      - ${GOOGLE_SERVICE_ACCOUNT_FILE:-./secrets/google-service-account.json}:/run/secrets/google-service-account.json:ro
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      disable: true

volumes:
  postgres-data:
  document-cache:

networks:
  web:
    external: true
